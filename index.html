<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodTimes Radio - Vintage International</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #12121a;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --copper: #b87333;
      --copper-light: #d4915f;
      --cream: #f5e6d3;
      --green-led: #22c55e;
      --amber-led: #f59e0b;
      --display-bg: #1a1a0a;
      --display-text: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-dark);
      font-family: 'Space Grotesk', sans-serif;
      padding: 20px;
      background-image: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
    }

    .radio {
      background: linear-gradient(180deg, #2a2520 0%, #1a1510 100%);
      border-radius: 35px;
      padding: 35px 40px;
      box-shadow: 
        0 30px 80px rgba(0,0,0,0.8),
        0 0 0 4px #3a3530,
        0 0 0 6px #1a1510,
        inset 0 2px 0 rgba(255,255,255,0.05);
      max-width: 520px;
      width: 100%;
    }

    .speaker-array {
      position: absolute;
      top: 25px;
      right: 30px;
      display: grid;
      grid-template-columns: repeat(3, 12px);
      gap: 8px;
    }

    .speaker-hole {
      width: 12px;
      height: 12px;
      background: #0a0a0f;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .brand {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(180deg, var(--copper-light), var(--copper));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      letter-spacing: 4px;
    }

    .subtitle {
      color: var(--cream);
      opacity: 0.6;
      font-size: 0.75rem;
      letter-spacing: 2px;
      margin-top: 5px;
    }

    .display {
      background: var(--display-bg);
      border-radius: 18px;
      padding: 25px;
      margin-bottom: 25px;
      border: 3px solid var(--copper);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
      position: relative;
    }

    .display::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none;
      border-radius: 15px;
    }

    .station-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green-led);
      box-shadow: 0 0 10px var(--green-led);
      animation: pulse 2s infinite;
    }

    .led.error { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
    .led.loading { background: var(--amber-led); box-shadow: 0 0 10px var(--amber-led); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .station-name {
      color: var(--copper);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .track-title {
      color: var(--display-text);
      font-size: 1.1rem;
      font-weight: 700;
      text-shadow: 0 0 15px var(--amber-led);
      line-height: 1.4;
      min-height: 2.8em;
    }

    .track-artist {
      color: var(--display-text);
      opacity: 0.7;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .vu-meter {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 35px;
      margin: 15px 0;
    }

    .vu-bar {
      width: 6px;
      background: linear-gradient(to top, var(--green-led), var(--amber-led), #ef4444);
      border-radius: 3px;
      transition: height 0.1s ease;
    }

    .freq-display {
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      border: 1px solid rgba(184, 115, 51, 0.3);
    }

    .freq {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      color: var(--amber-led);
      text-shadow: 0 0 15px var(--amber-led);
      letter-spacing: 3px;
    }

    .progress-container { margin-top: 18px; }

    .progress-bar {
      height: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, var(--amber-led), #fbbf24);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s linear;
      box-shadow: 0 0 10px var(--amber-led);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--display-text);
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    .ctrl-btn {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(180deg, var(--copper-light), var(--copper));
      color: #1a1510;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.3);
      transition: all 0.15s ease;
    }

    .ctrl-btn:hover { transform: translateY(-2px); }
    .ctrl-btn:active { transform: translateY(1px); }
    .ctrl-btn.play { width: 70px; height: 70px; font-size: 1.8rem; }
    .ctrl-btn:disabled { opacity: 0.5; }

    .secondary-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .sec-btn {
      background: transparent;
      border: 2px solid var(--copper);
      color: var(--copper);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .sec-btn:hover { background: var(--copper); color: #1a1510; }
    .sec-btn.active { background: #ef4444; border-color: #ef4444; color: white; }

    .info-panel {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 15px;
    }

    .info-title {
      color: var(--copper);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .info-content {
      font-size: 0.8rem;
      color: var(--cream);
      opacity: 0.8;
      line-height: 1.5;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      font-size: 0.7rem;
      color: var(--copper);
      opacity: 0.7;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: var(--copper); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="radio">
    <div class="speaker-array">
      <div class="speaker-hole"></div>
      <div class="speaker-hole"></div>
      <div class="speaker-hole"></div>
      <div class="speaker-hole"></div>
      <div class="speaker-hole"></div>
      <div class="speaker-hole"></div>
    </div>
    
    <div class="header">
      <div class="brand">GOODTIMES</div>
      <a href="coletor.html" class="subtitle" style="color: var(--copper); text-decoration: underline; cursor: pointer;">Vintage International Radio</a>
    </div>

    <div class="display">
      <div class="station-label">
        <div class="led" id="led"></div>
        <span class="station-name" id="stationLabel">Searching Archive.org...</span>
      </div>
      
      <div class="track-title" id="trackTitle">Please wait</div>
      <div class="track-artist" id="trackArtist">-</div>
      
      <div class="vu-meter" id="vuMeter">
        <div class="vu-bar" style="height: 10px;"></div>
        <div class="vu-bar" style="height: 15px;"></div>
        <div class="vu-bar" style="height: 20px;"></div>
        <div class="vu-bar" style="height: 15px;"></div>
        <div class="vu-bar" style="height: 25px;"></div>
        <div class="vu-bar" style="height: 20px;"></div>
        <div class="vu-bar" style="height: 15px;"></div>
        <div class="vu-bar" style="height: 10px;"></div>
      </div>
      
      <div class="freq-display">
        <div class="freq" id="frequency">--.- FM</div>
      </div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
      <button class="ctrl-btn play" id="playBtn" title="Play">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
    </div>

    <div class="secondary-row">
      <button class="sec-btn" id="shuffleBtn">🔀 Shuffle</button>
      <button class="sec-btn" id="favBtn">♡ Favorite</button>
    </div>

    <div class="info-panel">
      <div class="info-title">ℹ About Public Domain</div>
      <div class="info-content">
        <strong>USA:</strong> Sound recordings published before 1923 are PD.<br>
        <strong>EU:</strong> Sound recordings = 70 years from publication.<br>
        <strong>Source:</strong> Archive.org 78rpm & early recordings.
      </div>
    </div>

    <div class="status-bar">
      <span id="trackCount">0 tracks</span>
      <span id="statusText">Ready</span>
    </div>
  </div>

  <script>
    const TIMEOUT_MS = 6000;
    const STORAGE_KEY = 'goodtimesPlaylist';
    
    let playlist = [];
    let currentIndex = 0;
    let isPlaying = false;
    let favorites = JSON.parse(localStorage.getItem('goodtimesFavorites')) || [];
    let shuffle = false;
    let isLoading = false;

    const audio = new Audio();
    audio.crossOrigin = "anonymous";

    const led = document.getElementById('led');
    const stationLabel = document.getElementById('stationLabel');
    const trackTitle = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const frequency = document.getElementById('frequency');
    const progress = document.getElementById('progress');
    const currentTime = document.getElementById('currentTime');
    const totalTime = document.getElementById('totalTime');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const favBtn = document.getElementById('favBtn');
    const trackCount = document.getElementById('trackCount');
    const statusText = document.getElementById('statusText');
    const vuMeter = document.getElementById('vuMeter');

    function setStatus(text, loading = false) {
      statusText.textContent = text;
      led.className = 'led' + (loading ? ' loading' : '');
    }

    function updateVU() {
      const bars = vuMeter.querySelectorAll('.vu-bar');
      bars.forEach(bar => {
        bar.style.height = isPlaying ? (Math.random() * 25 + 8) + 'px' : '10px';
      });
    }

    function searchArchive() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.length > 0) {
            playlist = parsed;
            trackCount.textContent = `${playlist.length} tracks`;
            setStatus('Ready to play');
            shufflePlaylist();
            loadTrack(0);
            return;
          }
        } catch (e) {}
      }
      
      setStatus('Searching Archive.org...', true);
      
      // International public domain queries - 78rpm, early jazz, brass bands
      const queries = [
        'subject:("78rpm" OR "cylinder" OR "acoustic") AND mediatype:audio',
        'subject:jazz AND mediatype:audio',
        'subject:ragtime AND mediatype:audio',
        'subject:("brass band" OR "marching band") AND mediatype:audio',
        'subject:swing AND mediatype:audio',
        'collection:etree AND mediatype:audio',
        'subject:blues AND mediatype:audio'
      ];

      Promise.all(queries.slice(0, 4).map(q => 
        fetch(`https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=date&rows=80&output=json`)
          .then(r => r.json())
          .catch(() => ({ response: { docs: [] } }))
      )).then(results => {
        const allDocs = results.flatMap(r => r.response?.docs || []).filter(d => d.identifier);
        
        const seen = new Set();
        const unique = allDocs.filter(d => {
          if (seen.has(d.identifier)) return false;
          seen.add(d.identifier);
          return true;
        }).slice(0, 150);

        playlist = unique.map(doc => ({
          id: doc.identifier,
          title: doc.title?.[0] || 'Unknown Title',
          artist: doc.creator?.[0] || 'Unknown Artist',
          year: doc.date?.[0]?.substring(0, 4),
          url: `https://archive.org/download/${doc.identifier}/`,
          verified: false
        })).filter(p => p.title && p.title !== 'Unknown Title');

        trackCount.textContent = `${playlist.length} tracks`;
        
        if (playlist.length > 0) {
          setStatus('Ready to play');
          shufflePlaylist();
          loadTrack(0);
        } else {
          setStatus('No tracks found');
        }
      });
    }

    function shufflePlaylist() {
      for (let i = playlist.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
      }
    }

    async function tryLoadAudio(url) {
      return new Promise((resolve, reject) => {
        const testAudio = new Audio();
        testAudio.crossOrigin = "anonymous";
        
        const timeout = setTimeout(() => {
          testAudio.src = '';
          reject(new Error('Timeout'));
        }, TIMEOUT_MS);

        testAudio.oncanplaythrough = () => {
          clearTimeout(timeout);
          resolve(url);
        };
        
        testAudio.onerror = () => {
          clearTimeout(timeout);
          reject(new Error('Error'));
        };

        testAudio.src = url;
        testAudio.load();
      });
    }

    async function getValidAudioUrl(track) {
      const patterns = [
        track.url + track.id + '.mp3',
        track.url + track.id + '_64kb.mp3',
        track.url + '01.mp3',
        track.url + '01_64kb.mp3',
        track.url + track.id + '.ogg',
        track.url + track.id + '_vbr.mp3',
        track.url + track.id + '_128kb.mp3'
      ];

      for (const url of patterns) {
        try {
          const valid = await tryLoadAudio(url);
          return valid;
        } catch { continue; }
      }
      return null;
    }

    async function loadTrack(index) {
      if (playlist.length === 0) return;
      
      currentIndex = index;
      const track = playlist[currentIndex];
      
      trackTitle.textContent = 'Looking for audio...';
      trackArtist.textContent = '-';
      setStatus('Loading...', true);
      isLoading = true;
      playBtn.disabled = true;

      try {
        const audioUrl = await getValidAudioUrl(track);
        
        if (!audioUrl) {
          setStatus('No audio available', true);
          nextTrack();
          return;
        }

        audio.src = audioUrl;
        trackTitle.textContent = track.title;
        trackArtist.textContent = track.artist;
        frequency.textContent = (87.5 + (currentIndex % 30) * 0.5).toFixed(1) + ' FM';
        
        setStatus('Ready');
        playBtn.disabled = false;
        isLoading = false;
      } catch (e) {
        setStatus('Error, skipping...', true);
        nextTrack();
      }
    }

    function togglePlay() {
      if (isLoading) return;
      
      if (isPlaying) {
        audio.pause();
        playBtn.textContent = '▶';
      } else {
        audio.play().catch(() => setStatus('Playback error', true));
        playBtn.textContent = '⏸';
      }
      isPlaying = !isPlaying;
    }

    function nextTrack() {
      const next = shuffle ? Math.floor(Math.random() * playlist.length) : (currentIndex + 1) % playlist.length;
      loadTrack(next);
      if (isPlaying) audio.play();
    }

    function prevTrack() {
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
      } else {
        const prev = (currentIndex - 1 + playlist.length) % playlist.length;
        loadTrack(prev);
        if (isPlaying) audio.play();
      }
    }

    function toggleFavorite() {
      if (playlist.length === 0) return;
      const track = playlist[currentIndex];
      const idx = favorites.findIndex(f => f.id === track.id);
      
      if (idx >= 0) {
        favorites.splice(idx, 1);
      } else {
        favorites.push({ ...track });
      }
      
      localStorage.setItem('goodtimesFavorites', JSON.stringify(favorites));
      updateFavButton();
    }

    function updateFavButton() {
      if (playlist.length === 0) return;
      const track = playlist[currentIndex];
      const isFav = favorites.some(f => f.id === track.id);
      favBtn.classList.toggle('active', isFav);
      favBtn.textContent = isFav ? '♥ Favorite' : '♡ Favorite';
    }

    function toggleShuffle() {
      shuffle = !shuffle;
      shuffleBtn.classList.toggle('active', shuffle);
    }

    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      return Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0');
    }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progress.style.width = (audio.currentTime / audio.duration * 100) + '%';
        currentTime.textContent = formatTime(audio.currentTime);
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      totalTime.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', nextTrack);
    audio.addEventListener('error', () => { if (isPlaying) { setStatus('Error, skipping...', true); setTimeout(nextTrack, 1000); }});

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    favBtn.addEventListener('click', toggleFavorite);
    shuffleBtn.addEventListener('click', toggleShuffle);

    setInterval(updateVU, 120);

    searchArchive();
  </script>
</body>
</html>
